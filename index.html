<script>
const runner = document.getElementById("runner");

let x = window.innerWidth/2;
let y = window.innerHeight/2;

let mx = x;
let my = y;

let speed = 0.03;

const msg = document.createElement("div");
msg.innerHTML = "😆 مسكتني!";
msg.style.cssText = `
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:white;
display:none;
z-index:999999;
`;
document.body.appendChild(msg);

document.addEventListener("mousemove",(e)=>{
    mx=e.clientX;
    my=e.clientY;
});

runner.addEventListener("click",(e)=>{
    e.preventDefault();

    x += (Math.random()-0.5)*800;
    y += (Math.random()-0.5)*800;

    x = Math.max(100,Math.min(window.innerWidth-100,x));
    y = Math.max(100,Math.min(window.innerHeight-100,y));
});

setInterval(()=>{
    speed = 0.15;

    setTimeout(()=>{
        speed = 0.03;
    },500);
},4000);

function animate(){

    const dx = mx - x;
    const dy = my - y;

    const dist = Math.sqrt(dx*dx + dy*dy);

    const scale = Math.max(1, 3 - dist/300);

    runner.style.transform =
        `translate(-50%,-50%) scale(${scale})`;

    x += dx * speed;
    y += dy * speed;

    runner.style.left = x + "px";
    runner.style.top = y + "px";

    if(dist < 40){

        msg.style.display="block";

        setTimeout(()=>{
            msg.style.display="none";
        },1000);

        x = Math.random()*window.innerWidth;
        y = Math.random()*window.innerHeight;
    }

    requestAnimationFrame(animate);
}

animate();
</script>
