<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطاردة الماوس 😆</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#111;
    cursor:crosshair;
}

#runner{
    position:fixed;
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    pointer-events:auto;
    z-index:99999;
    transform:translate(-50%,-50%);
    box-shadow:0 0 30px rgba(255,255,255,.4);
    transition:transform .1s linear;
}

#message{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:50px;
    font-family:Arial;
    display:none;
    z-index:100000;
    text-align:center;
}
</style>
</head>
<body>

<img id="runner" src="photo.png" alt="Runner">

<div id="message">😆 مسكتني!</div>

<script>

const runner = document.getElementById("runner");
const message = document.getElementById("message");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

let mouseX = x;
let mouseY = y;

let speed = 0.03;

document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

runner.addEventListener("click",()=>{

    x = Math.random() * (window.innerWidth - 200) + 100;
    y = Math.random() * (window.innerHeight - 200) + 100;

    speed = 0.25;

    setTimeout(()=>{
        speed = 0.03;
    },1000);

});

setInterval(()=>{

    speed = 0.15;

    setTimeout(()=>{
        speed = 0.03;
    },500);

},4000);

function animate(){

    let dx = mouseX - x;
    let dy = mouseY - y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let scale = Math.max(1, 3 - dist/300);

    if(mouseX > x){
        runner.style.transform =
        `translate(-50%,-50%) scale(${scale})`;
    }else{
        runner.style.transform =
        `translate(-50%,-50%) scaleX(-1) scale(${scale})`;
    }

    x += dx * speed;
    y += dy * speed;

    runner.style.left = x + "px";
    runner.style.top = y + "px";

    if(dist < 40){

        message.style.display = "block";

        setTimeout(()=>{
            message.style.display = "none";
        },1000);

        x = Math.random() * window.innerWidth;
        y = Math.random() * window.innerHeight;
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
