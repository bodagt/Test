<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المطاردة 😂</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#111;
    cursor:crosshair;
}

#runner{
    position:fixed;
    width:180px;
    height:auto;
    object-fit:contain;
    pointer-events:auto;
    z-index:99999;
    transform:translate(-50%,-50%);
    transition:transform .1s linear;
    user-select:none;
    -webkit-user-drag:none;
}

#message{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#fff;
    font-size:60px;
    font-weight:bold;
    font-family:Arial,sans-serif;
    display:none;
    z-index:100000;
    text-shadow:0 0 20px rgba(255,255,255,.5);
}
</style>
</head>
<body>

<img id="runner" src="photo.png" alt="photo">

<div id="message">يا علق 😂</div>

<script>

const runner = document.getElementById("runner");
const message = document.getElementById("message");

let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

let mouseX = x;
let mouseY = y;

let speed = 0.01;

document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

runner.addEventListener("click",()=>{

    x = Math.random() * (window.innerWidth - 300) + 150;
    y = Math.random() * (window.innerHeight - 300) + 150;

    speed = 0.08;

    setTimeout(()=>{
        speed = 0.01;
    },800);

});

setInterval(()=>{

    speed = 0.05;

    setTimeout(()=>{
        speed = 0.01;
    },400);

},6000);

function animate(){

    let dx = mouseX - x;
    let dy = mouseY - y;

    let dist = Math.sqrt(dx*dx + dy*dy);

    let scale = Math.max(1, 2.2 - dist/400);

    if(mouseX > x){
        runner.style.transform =
        `translate(-50%,-50%) scale(${scale})`;
    }else{
        runner.style.transform =
        `translate(-50%,-50%) scaleX(-1) scale(${scale})`;
    }

    x += dx * speed;
    y += dy * speed;

    runner.style.left = x + "px";
    runner.style.top = y + "px";

    if(dist < 30){

        message.style.display = "block";

        setTimeout(()=>{
            message.style.display = "none";
        },1200);

        x = Math.random() * window.innerWidth;
        y = Math.random() * window.innerHeight;
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
