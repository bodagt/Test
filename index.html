<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مطاردة الماوس</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#111;
    cursor:crosshair;
}

.runner{
    position:fixed;
    width:120px;
    height:120px;
    font-size:90px;
    pointer-events:none;
    transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div class="runner" id="runner">🏃🏿‍♂️</div>

<script>
const runner = document.getElementById("runner");

let x = window.innerWidth/2;
let y = window.innerHeight/2;

let mouseX = x;
let mouseY = y;

document.addEventListener("mousemove",(e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate(){

    x += (mouseX - x) * 0.03;
    y += (mouseY - y) * 0.03;

    runner.style.left = x + "px";
    runner.style.top = y + "px";

    if(mouseX > x){
        runner.style.transform =
        "translate(-50%,-50%) scaleX(1)";
    }else{
        runner.style.transform =
        "translate(-50%,-50%) scaleX(-1)";
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
