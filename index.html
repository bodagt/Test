<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اضغط هنا 😅</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#111;
    font-family:Cairo,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

#btn{
    position:absolute;
    padding:15px 30px;
    font-size:22px;
    cursor:pointer;
    border:none;
    border-radius:12px;
}

#msg{
    color:white;
    font-size:60px;
    display:none;
}
</style>
</head>
<body>

<button id="btn">اضغط هنا</button>
<h1 id="msg">طز فيك 😂</h1>

<script>
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");

let count = 0;

btn.addEventListener("click", () => {
    count++;

    if(count < 10){
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 70);

        btn.style.left = x + "px";
        btn.style.top = y + "px";
    } else {
        btn.style.display = "none";
        msg.style.display = "block";
    }
});
</script>

</body>
</html>
